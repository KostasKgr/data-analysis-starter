version: 2

models:
  - name: customer_order_summary
    description: "One row per customer with simple order and completed revenue metrics."
    columns:
      - name: customer_id
        description: "Stable customer identifier."
        data_tests:
          - not_null
          - unique
      - name: customer_name
        description: "Customer display name."
      - name: segment
        description: "Customer market segment."
      - name: order_count
        description: "Total orders for the customer across all statuses."
      - name: completed_order_count
        description: "Completed orders for the customer."
      - name: completed_revenue
        description: "Revenue from completed orders only."
      - name: latest_order_date
        description: "Most recent order date for the customer."

  - name: order_dashboard
    description: "Order-level dashboard table enriched with customer attributes."
    columns:
      - name: order_id
        description: "Stable order identifier."
        data_tests:
          - not_null
          - unique
      - name: customer_id
        description: "Customer that placed the order."
        data_tests:
          - not_null
      - name: customer_name
        description: "Customer display name."
      - name: segment
        description: "Customer market segment."
      - name: order_date
        description: "Date the order was placed."
        data_tests:
          - not_null
      - name: status
        description: "Current order status."
        data_tests:
          - not_null
      - name: gross_amount
        description: "Gross order amount."
      - name: completed_revenue
        description: "Gross amount for completed orders, otherwise zero."
      - name: order_month
        description: "Month bucket used for dashboard trends."
